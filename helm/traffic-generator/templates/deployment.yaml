apiVersion: apps/v1
kind: Deployment

metadata:
  name: traffic-generator

spec:
  replicas: 1

  selector:
    matchLabels:
      app: traffic-generator

  template:

    metadata:
      labels:
        app: traffic-generator

    spec:

      containers:

      - name: traffic-generator

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"