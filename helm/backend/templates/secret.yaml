{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret

metadata:
  name: backend-secret

type: Opaque

# Values come from --set/--set-string at deploy time (populated from a CI
# secret store), never committed to this repo as real credentials. For a
# more robust setup, point .Values.secrets.existingSecret at a Secret
# managed by External Secrets Operator / AWS Secrets Manager instead and
# this template will be skipped entirely.
stringData:
  MYSQL_USER: {{ required "secrets.mysqlUser is required" .Values.secrets.mysqlUser | quote }}
  MYSQL_PASSWORD: {{ required "secrets.mysqlPassword is required" .Values.secrets.mysqlPassword | quote }}
  MYSQL_DATABASE: {{ .Values.mysql.database | quote }}
  JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
{{- end }}
