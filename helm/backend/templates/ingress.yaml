{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1

kind: Ingress

metadata:
  name: backend-ingress

spec:

  ingressClassName: nginx

  rules:

  - host: {{ .Values.ingress.host }}

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: backend-service

            port:

              number: 5000

{{- end }}