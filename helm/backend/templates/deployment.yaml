apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5000"
    spec:
      # Spread replicas across nodes instead of letting the scheduler
      # potentially stack all of them on one node.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: backend
              topologyKey: kubernetes.io/hostname

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: backend
        image: "{{ .Values.image.repository }}:{{ required \"image.tag must be set to an explicit build tag\" .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]

        ports:
        - containerPort: 5000
          name: http

        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: {{ .Values.secrets.existingSecret | default "backend-secret" }}

        resources:
{{ toYaml .Values.resources | indent 10 }}

        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 10

        livenessProbe:
          httpGet:
            path: /live
            port: 5000
          initialDelaySeconds: 20
