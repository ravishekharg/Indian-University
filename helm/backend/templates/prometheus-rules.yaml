apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: backend-alerts

spec:
  groups:
  - name: backend.rules
    rules:
    - alert: HighApiErrorRate
      expr: rate(api_errors_total[5m]) > 1
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: High API Error Rate

    - alert: HighApiLatency
      expr: histogram_quantile(
          0.95,
          rate(
            request_latency_seconds_bucket[5m]
          )
        ) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: API latency exceeded 1 second