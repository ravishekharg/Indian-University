[defaults]

inventory = inventories/dev/hosts.ini
roles_path = ./roles
# Disabled for first-boot convenience against freshly-created EC2 instances.
# For anything beyond a disposable lab, set this to True and pre-seed
# known_hosts (e.g. via the AWS EC2 console's "Get instance screenshot"
# host-key output, or a config-management step that runs before this),
# since False accepts any host key silently and is vulnerable to MITM.
host_key_checking = False
timeout = 60
forks = 20
remote_user = ec2-user
private_key_file = ~/.ssh/gurram-university-key
interpreter_python = /usr/bin/python3
become = True

[privilege_escalation]
become = True

[ssh_connection]
ssh_args = -o ControlMaster=no
pipelining = False

[ssh_connection]
ssh_args = -o ControlMaster=no
pipelining = False